<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items - FoundIt</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/items.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">FoundIt</a>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="create-item.html">Post Item</a>
                <a href="my-items.html">My Items</a>
                <span class="nav-auth" id="authLinks">
                    <a href="login.html">Login</a>
                    <a href="register.html" class="btn-primary-small">Register</a>
                </span>
                <span class="nav-auth" id="userInfo" style="display: none;">
                    <span class="username-display" id="usernameDisplay"></span>
                    <button class="btn-logout" id="logoutBtn">Logout</button>
                </span>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main>
        <div class="my-items-container">
            <div class="my-items-header">
                <h1>My Items</h1>
                <a href="create-item.html" class="btn-primary">Post New Item</a>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading your items...</p>
            </div>
            
            <div class="items-grid" id="myItemsGrid">
                </div>
            
            <div class="no-items" id="noItems" style="display: none;">
                <p>You haven't posted any items yet.</p>
                <a href="create-item.html" class="btn-primary" style="margin-top: 1rem;">Post Your First Item</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 FoundIt - Campus Lost & Found System</p>
            <p>Helping students find what they've lost</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/my-items.js"></script>
</body>
</html>
